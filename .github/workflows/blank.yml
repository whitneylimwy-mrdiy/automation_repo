name: Scheduled Email

on:
  schedule:
    - cron: '0 11 * * 1'  # Every Monday at 11:00 AM UTC
  workflow_dispatch:

jobs:
  send-email:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4        # ← v3 to v4

      - name: Set up Python
        uses: actions/setup-python@v5    # ← v4 to v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas

      - name: Run email script
        env:
          EMAIL_PASSWORD: ${{ secrets.APP_PASSWORD }}
        run: python email_automation.py
