name: Scheduled Email

on:
  schedule:
    - cron: '0 11 * * 1'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  send-email:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas google-auth google-auth-oauthlib gspread   # ← Add this

      - name: Run email script
        env:
          EMAIL_PASSWORD: ${{ secrets.APP_PASSWORD }}
        run: python email_automation.py
